<h1>Neues Projekt anlegen</h1>
<fieldset>
    <legend>Neues Projekt:</legend>
    <form action="" method="post">
        <label for="Projectname">Name:</label>
        <input type="text" id="Projectname">
        <label for="Projectmanager">Projektleiter:</label>
        <input type="text" id="Projectmanager">
        <label for="startdate">Startdatum:</label>
        <input type="date" id="startdate">
        <label for="enddate">Enddatum:</label>
        <input type="date" id="enddate">
        <label for="shortdescription">Kurzbeschreibung:</label>
        <input type="text" id="shortdescription">
        <label for="longdescription">Langbeschreibung:</label>
        <input type="text" id="longdescription">
        <label for="projectgoal1">Erstes Projektziel:</label>
        <input type="text" id="projectgoal1">
        <label for="projectgoal2">Zweites Projekziel:</label>
        <input type="text" id="projectgoal2">
        <label for="logofile">Logodatei:</label>
        <input type="file" accept=".svg">
        <input type="submit" Value="Neues Projekt erstellen">
    </form>
</fieldset>


<fieldset>
    <legend>Anmeldung</legend>
    <form action="localhost:11111" method="post">
        <label for="username">Benutzername:</label>
        <input type="text" name="username">
        <label for="password">Passwort:</label>
        <input type = "password" name="password">
        <input type="submit" value="Anmelden">
    </form>

</fieldset>
